version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm_secret
      POSTGRES_DB: personal_crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm -d personal_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: personal_crm
      DB_USER: crm
      DB_PASSWORD: crm_secret
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npm run migrate && npm run seed && node dist/index.js"

  web:
    build: ./client
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  postgres_data:
